<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCal - Mi Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
</head>
<body class="bg-slate-50">
    <div class="max-w-4xl mx-auto p-8">
        <h1 class="text-6xl font-bold text-center mb-4 text-indigo-700">UniCal</h1>
        <p class="text-center text-2xl mb-12">Mi agenda unificada personal</p>
        
        <div class="bg-white rounded-3xl shadow-2xl p-10">
            <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
                <span>📅</span> Agenda Hoy
            </h2>
            <div id="agenda" class="space-y-4"></div>
        </div>
        
        <div class="mt-12 text-center">
            <button onclick="addNewEvent()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-2xl px-16 py-6 rounded-3xl font-medium shadow-lg">
                + Nueva tarea o reunión
            </button>
        </div>
    </div>

    <script>
        let events = [{time: "09:00", title: "Reunión equipo (Extrimian)"}, {time: "11:30", title: "Cita salud"}];

        function renderAgenda() {
            document.getElementById('agenda').innerHTML = events.map(ev => `
                <div class="flex gap-6 p-6 bg-slate-50 rounded-2xl">
                    <div class="font-mono text-2xl font-medium w-24 text-slate-500">${ev.time}</div>
                    <div class="flex-1 text-xl">${ev.title}</div>
                </div>
            `).join('');
        }

        function addNewEvent() {
            const title = prompt("¿Qué tarea o reunión quieres añadir?");
            if (title) {
                const now = new Date();
                const time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                events.unshift({time, title: title.trim()});
                renderAgenda();
            }
        }

        renderAgenda();
    </script>
</body>
</html>
Mejorada versión con PWA y añadir eventos
